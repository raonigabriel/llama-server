name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # --- JOB 1: DOCKER VARIANTS (Linux) ---
  build-docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: opi5
            arch: arm64
            flags: "-march=armv8-a+simd"
            cuda: "OFF"
            base: alpine:latest
            runtime: alpine:latest
          - variant: morefine
            arch: amd64
            flags: "-march=x86-64-v2"
            cuda: "OFF"
            base: alpine:latest
            runtime: alpine:latest
          - variant: xeon-cuda
            arch: amd64
            flags: "-march=x86-64-v3"
            cuda: "ON"
            base: nvidia/cuda:13.2.0-devel-ubuntu24.04
            runtime: nvidia/cuda:13.2.0-base-ubuntu24.04

    steps:
      - uses: actions/checkout@v4

      - name: Clone llama.cpp
        id: llama-sha
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp.git llama-src
          echo "sha=$(cd llama-src && git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          rm -rf llama-src/.git

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            RUNTIME_IMAGE=${{ matrix.runtime }}
            ARCH_FLAGS=${{ matrix.flags }}
            VARIANT=${{ matrix.variant }}
            USE_CUDA=${{ matrix.cuda }}
            LLAMA_SHA=${{ steps.llama-sha.outputs.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.variant }}-${{ steps.llama-sha.outputs.sha }}
            ghcr.io/${{ github.repository }}:${{ matrix.variant }}-latest

  # --- JOB 2: WINDOWS STANDALONE ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "13.2.0"

      - name: Clone llama.cpp
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp.git llama-src

      - name: Build Static Exe
        shell: pwsh
        run: |
          cd llama-src
          cmake -B build `
            -DGGML_NATIVE=OFF `
            -DCMAKE_C_FLAGS="/arch:AVX2" `
            -DCMAKE_CXX_FLAGS="/arch:AVX2" `
            -DGGML_CUDA=ON `
            -DCMAKE_CUDA_ARCHITECTURES=86 `
            -DBUILD_SHARED_LIBS=OFF `
            -DGGML_STATIC=ON `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS --target llama-server

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-windows-v3-cuda
          path: llama-src/build/bin/Release/llama-server.exe
