name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # --- JOB 1: DOCKER VARIANTS (Linux) ---
  build-docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: opi5
            arch: arm64
            flags: "-march=armv8-a+simd"
            cuda: "OFF"
            base: alpine:latest
            runtime: alpine:latest
          - variant: morefine
            arch: amd64
            flags: "-march=x86-64-v2"
            cuda: "OFF"
            blas: "OFF"
            openssl: "OFF"
            boringssl: "ON"
            extra_cmake: "-DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF -DGGML_BMI2=OFF"
            base: alpine:latest
            runtime: alpine:latest
          - variant: xeon-cuda
            arch: amd64
            flags: "-march=x86-64-v3"
            cuda: "ON"
            blas: "ON"
            cuda_arch: "86"
            base: nvidia/cuda:13.2.0-devel-ubuntu24.04
            runtime: nvidia/cuda:13.2.0-base-ubuntu24.04

    steps:
      - uses: actions/checkout@v4

      - name: Clone llama.cpp
        id: llama-sha
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp.git llama-src
          echo "sha=$(cd llama-src && git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          cd llama-src
          git fetch --unshallow 2>/dev/null || true
          number=$(git rev-list --count HEAD 2>/dev/null || echo 0)
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            RUNTIME_IMAGE=${{ matrix.runtime }}
            ARCH_FLAGS=${{ matrix.flags }}
            VARIANT=${{ matrix.variant }}
            USE_CUDA=${{ matrix.cuda }}
            USE_BLAS=${{ matrix.blas || 'ON' }}
            USE_OPENSSL=${{ matrix.openssl || 'ON' }}
            USE_BORINGSSL=${{ matrix.boringssl || 'OFF' }}
            EXTRA_CMAKE_ARGS=${{ matrix.extra_cmake || '' }}
            CUDA_ARCH=${{ matrix.cuda_arch || 'native' }}
            LLAMA_SHA=${{ steps.llama-sha.outputs.sha }}
            LLAMA_BUILD_NUMBER=${{ steps.llama-sha.outputs.number || '0' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.variant }}-${{ steps.llama-sha.outputs.sha }}
            ghcr.io/${{ github.repository }}:${{ matrix.variant }}-latest

  # --- JOB 2: WINDOWS STANDALONE ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "13.2.0"

      - name: Clone llama.cpp
        id: llama-sha
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp.git llama-src
          $sha = git -C llama-src rev-parse --short=12 HEAD
          echo "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Build Static Exe
        shell: pwsh
        run: |
          cd llama-src
          cmake -B build `
            -DGGML_NATIVE=OFF `
            -DCMAKE_C_FLAGS="/arch:AVX2" `
            -DCMAKE_CXX_FLAGS="/arch:AVX2" `
            -DGGML_CUDA=ON `
            -DCMAKE_CUDA_ARCHITECTURES=86 `
            -DBUILD_SHARED_LIBS=OFF `
            -DGGML_STATIC=ON `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS --target llama-server

      - name: Package distribution
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          $sha = "${{ steps.llama-sha.outputs.sha }}"
          $distName = "llama-server-windows-v3-cuda-$sha"
          Compress-Archive -Path llama-src/build/bin/Release/llama-server.exe -DestinationPath "dist/$distName.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-windows-v3-cuda
          path: llama-src/build/bin/Release/llama-server.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-cuda-${{ steps.llama-sha.outputs.sha }}
          name: llama-server Windows CUDA (llama.cpp ${{ steps.llama-sha.outputs.sha }})
          body: |
            Windows x86_64 standalone build with AVX2 + CUDA 13.2 support.
            Built from llama.cpp commit `${{ steps.llama-sha.outputs.sha }}`.

            **Requirements:**
            - NVIDIA GPU with compute capability 8.6+ (RTX 30/40 series)
            - CUDA runtime DLLs (`cublas64_13.dll`, `cublasLt64_13.dll`) from [CUDA Toolkit 13.2](https://developer.nvidia.com/cuda-toolkit) in the same directory or on PATH
          files: dist/*.zip

  # --- JOB 3: WINDOWS CPU-ONLY ---
  build-windows-cpu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone llama.cpp
        id: llama-sha
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp.git llama-src
          $sha = git -C llama-src rev-parse --short=12 HEAD
          echo "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Build Static Exe
        shell: pwsh
        run: |
          cd llama-src
          cmake -B build `
            -DGGML_NATIVE=OFF `
            -DCMAKE_C_FLAGS="/arch:AVX2" `
            -DCMAKE_CXX_FLAGS="/arch:AVX2" `
            -DBUILD_SHARED_LIBS=OFF `
            -DGGML_STATIC=ON `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS --target llama-server

      - name: Package distribution
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          $sha = "${{ steps.llama-sha.outputs.sha }}"
          $distName = "llama-server-windows-v3-cpu-$sha"
          Compress-Archive -Path llama-src/build/bin/Release/llama-server.exe -DestinationPath "dist/$distName.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-windows-v3-cpu
          path: llama-src/build/bin/Release/llama-server.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-cpu-${{ steps.llama-sha.outputs.sha }}
          name: llama-server Windows CPU (llama.cpp ${{ steps.llama-sha.outputs.sha }})
          body: |
            Windows x86_64 standalone CPU-only build with AVX2 support.
            Built from llama.cpp commit `${{ steps.llama-sha.outputs.sha }}`.

            **Requirements:**
            - CPU with AVX2 support (Intel Haswell / AMD Excavator or newer)
          files: dist/*.zip
